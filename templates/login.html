<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Logare - Coffee Risk</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <header class="main-header">
    <div class="header-left">
      <a href="/" class="brand">Coffee Risk</a>
    </div>
    <nav class="header-right">
      <a href="/dashboard" class="nav-link">Dashboard</a>
      <a href="/form" class="nav-link">Evaluare personală</a>
      <a href="/" class="nav-link nav-primary">Logare</a>
    </nav>
  </header>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Login Form -->
      <div id="loginForm">
        <h1 class="login-title">Sign In</h1>
        <p class="login-subtitle">Autentificare platformă analiză consum de cafea</p>

        <form id="loginFormElement">
          <label for="loginUsername">Username</label>
          <input id="loginUsername" type="text" placeholder="Introduceți utilizatorul" required>

          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Introduceți parola" required>

          <button type="button" class="cta-button" onclick="handleLogin()">LOGIN</button>
        </form>

        <p style="text-align: center; margin-top: 15px;">
          Nu aveți cont? <a href="#" onclick="toggleForms()" style="color: #007bff; cursor: pointer;">Înregistrați-vă</a>
        </p>
        <div id="loginError" style="color: red; margin-top: 10px; display: none;"></div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" style="display: none;">
        <h1 class="login-title">Create Account</h1>
        <p class="login-subtitle">Creați cont pentru a accesa platforma</p>

        <form id="registerFormElement">
          <label for="registerUsername">Username</label>
          <input id="registerUsername" type="text" placeholder="Alegeți un nume de utilizator" minlength="3" maxlength="50" required>
          <small style="color: #666;">Minim 3 caractere</small>

          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" placeholder="Introduceți o parolă sigură" minlength="8" required>
          <small style="color: #666;">Minim 8 caractere</small>

          <button type="button" class="cta-button" onclick="handleRegister()">SIGN UP</button>
        </form>

        <p style="text-align: center; margin-top: 15px;">
          Aveți deja cont? <a href="#" onclick="toggleForms()" style="color: #007bff; cursor: pointer;">Conectați-vă</a>
        </p>
        <div id="registerError" style="color: red; margin-top: 10px; display: none;"></div>
      </div>
    </div>
  </div>

  <script>
    function toggleForms() {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
      registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
      clearErrors();
    }

    function clearErrors() {
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('registerError').style.display = 'none';
    }

    async function handleLogin() {
      clearErrors();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!username || !password) {
        showError('loginError', 'Please fill in all fields');
        return;
      }

      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!resp.ok) {
          const error = await resp.json();
          showError('loginError', error.detail || 'Login failed');
          return;
        }

        const data = await resp.json();
        // Store token in cookies
        document.cookie = `access_token=${data.access_token}; path=/; max-age=1800`; // 30 minutes
        // Redirect to dashboard
        window.location.href = '/dashboard';
      } catch (error) {
        showError('loginError', 'Error: ' + error.message);
      }
    }

    async function handleRegister() {
      clearErrors();
      const username = document.getElementById('registerUsername').value.trim();
      const password = document.getElementById('registerPassword').value;

      if (!username || !password) {
        showError('registerError', 'Please fill in all fields');
        return;
      }

      if (username.length < 3) {
        showError('registerError', 'Username must be at least 3 characters');
        return;
      }

      if (password.length < 8) {
        showError('registerError', 'Password must be at least 8 characters');
        return;
      }

      try {
        const resp = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!resp.ok) {
          const error = await resp.json();
          showError('registerError', error.detail || 'Registration failed');
          return;
        }

        const data = await resp.json();
        // Store token in cookies
        document.cookie = `access_token=${data.access_token}; path=/; max-age=1800`; // 30 minutes
        // Redirect to dashboard
        window.location.href = '/dashboard';
      } catch (error) {
        showError('registerError', 'Error: ' + error.message);
      }
    }

    function showError(elementId, message) {
      const errorEl = document.getElementById(elementId);
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }
  </script>
</body>
</html>
