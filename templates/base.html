<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Coffee Risk{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% if current_page == 'form' %}
  <link rel="stylesheet" href="/static/form.css">
  {% endif %}
  {% block head_extra %}{% endblock %}
</head>
<body class="app-body {% block body_class %}{% endblock %}">

<header class="main-header">
  <div class="header-left">
    <a href="/" class="brand">CoffeeRisk</a>
    <span class="brand-subtitle">Insight stres & sănătate</span>
  </div>

  <nav class="header-right">
    <a href="/dashboard" class="nav-link{% if current_page == 'dashboard' %} active{% endif %}">Dashboard</a>
    <a href="/form" class="nav-link{% if current_page == 'form' %} active{% endif %}">Formular</a>
    <a href="/history" class="nav-link{% if current_page == 'history' %} active{% endif %}">Istoric</a>
    <a href="#" onclick="logout()" class="nav-link nav-primary">Delogare</a>
  </nav>
</header>

<main class="app-shell">
  {% block hero %}{% endblock %}
  {% block content %}{% endblock %}
</main>

<footer class="app-footer">
  <div class="footer-copy">CoffeeRisk • Evaluare personalizată a stresului</div>
</footer>

<script>
  function getToken() {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      const [name, value] = cookie.trim().split('=');
      if (name === 'access_token') return value;
    }
    return null;
  }

  function checkAuthentication() {
    const token = getToken();
    if (!token) {
      window.location.href = '/';
      return false;
    }
    return true;
  }

  function logout() {
    document.cookie = 'access_token=; path=/; max-age=0';
    window.location.href = '/';
  }

  window.addEventListener("load", checkAuthentication);
</script>

{% block scripts %}{% endblock %}

</body>
</html>
